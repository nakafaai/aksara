name: Publish contracts

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: contracts-production
  cancel-in-progress: false

jobs:
  stage:
    if: github.ref == 'refs/heads/main' && github.repository == 'nakafaai/aksara'
    environment: content-production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository
        run: |
          pnpm lint
          pnpm names
          pnpm jsdocs
          pnpm lines
          pnpm boundaries
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Verify contracts tarball
        run: pnpm --dir packages/contracts verify:package --output "$RUNNER_TEMP/aksara-contracts.tgz"

      - name: Stage contracts
        run: pnpm stage publish "$RUNNER_TEMP/aksara-contracts.tgz" --access public --json
