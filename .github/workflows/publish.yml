name: Publish contracts

on:
  workflow_dispatch:

permissions: {}

env:
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.15.1

concurrency:
  group: contracts-production
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main' && github.repository == 'nakafaai/aksara'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      tarball_sha256: ${{ steps.digest.outputs.tarball_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify static toolchain
        run: |
          if [[ "$(node --version)" != "v$NODE_VERSION" ]]; then
            echo "Node.js does not match the reviewed workflow version." >&2
            exit 1
          fi
          if [[ "$(pnpm --version)" != "$PNPM_VERSION" ]]; then
            echo "pnpm does not match the reviewed workflow version." >&2
            exit 1
          fi
          if [[ "$(jq -r '.packageManager // ""' package.json)" != "pnpm@$PNPM_VERSION" ]]; then
            echo "packageManager does not match the reviewed workflow version." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository
        run: |
          pnpm lint
          pnpm names
          pnpm jsdocs
          pnpm lines
          pnpm boundaries
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Verify contracts tarball
        run: pnpm --dir packages/contracts verify:package --output "$RUNNER_TEMP/aksara-contracts.tgz"

      - name: Record verified tarball digest
        id: digest
        run: |
          echo "tarball_sha256=$(sha256sum "$RUNNER_TEMP/aksara-contracts.tgz" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Upload verified tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aksara-contracts-${{ github.sha }}
          path: ${{ runner.temp }}/aksara-contracts.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  stage:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.repository == 'nakafaai/aksara'
    environment: content-production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
    steps:
      - name: Download verified tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aksara-contracts-${{ github.sha }}
          path: ${{ runner.temp }}/contracts

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
          token: ""

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Verify transferred tarball
        env:
          EXPECTED_SHA256: ${{ needs.verify.outputs.tarball_sha256 }}
          TARBALL: ${{ runner.temp }}/contracts/aksara-contracts.tgz
        run: |
          if [[ ! "$EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Verified tarball digest is malformed." >&2
            exit 1
          fi
          actual_sha256=$(sha256sum "$TARBALL" | cut -d ' ' -f 1)
          if [[ "$actual_sha256" != "$EXPECTED_SHA256" ]]; then
            echo "Transferred tarball digest does not match verification." >&2
            exit 1
          fi
          package_name=$(tar -xOf "$TARBALL" package/package.json | jq -r '.name // ""')
          if [[ "$package_name" != "@nakafa/aksara-contracts" ]]; then
            echo "Transferred tarball has an unexpected package identity." >&2
            exit 1
          fi
          registry_override=$(tar -xOf "$TARBALL" package/package.json | jq -r 'if (.publishConfig | type) == "object" and (.publishConfig | has("registry")) then "present" else "absent" end')
          if [[ "$registry_override" != "absent" ]]; then
            echo "Transferred tarball must not override the trusted registry." >&2
            exit 1
          fi

      - name: Stage contracts
        run: pnpm stage publish "$RUNNER_TEMP/contracts/aksara-contracts.tgz" --access public --json --registry=https://registry.npmjs.org/ --@nakafa:registry=https://registry.npmjs.org/
