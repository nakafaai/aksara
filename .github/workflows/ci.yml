name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact Changesets pull-request head to verify
        required: true
        type: string
      pull_request_number:
        description: Exact Changesets pull request to verify
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package bootstrap state
        run: |
          bootstrapped=$(jq -er 'if (.contracts | type) == "boolean" then (.contracts | tostring) else empty end' .changeset/bootstrap.json)
          package_version=$(jq -er '.version' packages/contracts/package.json)
          if [[ "$bootstrapped" == "false" ]]; then
            if [[ ! -f .github/workflows/bootstrap.yml || "$package_version" != "0.1.0" ]]; then
              echo "Incomplete bootstrap requires its one-time workflow and exact initial version." >&2
              exit 1
            fi
            exit 0
          fi
          if [[ "$bootstrapped" != "true" || -e .github/workflows/bootstrap.yml ]]; then
            echo "Completed bootstrap requires deleting its one-time workflow." >&2
            exit 1
          fi

      - name: Verify dispatched revision
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ || "$EXPECTED_SHA" != "$GITHUB_SHA" ]]; then
            echo "Dispatched CI must run at its exact expected revision." >&2
            exit 1
          fi
          if [[ ! "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "Dispatched CI pull request number is malformed." >&2
            exit 1
          fi

          pull=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")
          if ! jq -e --arg repository "$GITHUB_REPOSITORY" --arg sha "$EXPECTED_SHA" '
            .state == "open"
            and .draft == false
            and .base.ref == "main"
            and .base.repo.full_name == $repository
            and .head.ref == "changeset-release/main"
            and .head.repo.full_name == $repository
            and .head.sha == $sha
            and .user.login == "github-actions[bot]"
            and .user.type == "Bot"' <<<"$pull" >/dev/null; then
            echo "Dispatched CI is not bound to the exact ready Changesets pull request." >&2
            exit 1
          fi

      - name: Contract version intent
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login || 'github-actions[bot]' }}
          PR_HEAD: ${{ github.head_ref || github.ref_name }}
        run: |
          bootstrapped=$(jq -er 'if (.contracts | type) == "boolean" then (.contracts | tostring) else empty end' .changeset/bootstrap.json)
          if [[ "$bootstrapped" != "true" ]]; then
            echo "Initial package is not published; bootstrap version remains source-controlled."
            exit 0
          fi
          if [[ "$PR_HEAD" == "changeset-release/main" && "$PR_AUTHOR" == "github-actions[bot]" ]]; then
            echo "Trusted Changesets version pull request has consumed its source changesets."
            exit 0
          fi
          pnpm changeset status --since=origin/main

      - name: Lint
        run: pnpm lint

      - name: Deprecated APIs
        run: pnpm deprecations

      - name: File names
        run: pnpm names

      - name: Function documentation
        run: pnpm jsdocs

      - name: Module size
        run: pnpm lines

      - name: Workflow policy
        run: pnpm workflows

      - name: Workspace boundaries
        run: pnpm boundaries

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify contracts package boundary
        run: pnpm verify:package
