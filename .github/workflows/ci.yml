name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contract version intent
        if: github.event_name == 'pull_request'
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD: ${{ github.head_ref }}
        run: |
          bootstrapped=$(jq -er 'if (.contracts | type) == "boolean" then (.contracts | tostring) else empty end' .changeset/bootstrap.json)
          if [[ "$bootstrapped" != "true" ]]; then
            echo "Initial package is not published; bootstrap version remains source-controlled."
            exit 0
          fi
          if [[ "$PR_HEAD" == "changeset-release/main" && "$PR_AUTHOR" == "github-actions[bot]" ]]; then
            echo "Trusted Changesets version pull request has consumed its source changesets."
            exit 0
          fi
          pnpm changeset status --since=origin/main

      - name: Lint
        run: pnpm lint

      - name: File names
        run: pnpm names

      - name: Function documentation
        run: pnpm jsdocs

      - name: Module size
        run: pnpm lines

      - name: Workspace boundaries
        run: pnpm boundaries

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify contracts package boundary
        run: pnpm verify:package
