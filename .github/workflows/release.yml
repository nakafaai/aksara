name: Release content

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Publication operation
        required: true
        type: choice
        options:
          - accept
          - abort
          - cleanup
          - recover
          - release
          - rollback
      release_id:
        description: Exact release ID for the requested operation
        required: true
        type: string
      recovery_id:
        description: Exact retained inverse ID for release, rollback, accept, or recover
        required: false
        type: string
      rollback_of:
        description: Exact active release to reverse
        required: false
        type: string

permissions: {}

env:
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.15.1

concurrency:
  group: content-production
  cancel-in-progress: false

jobs:
  package:
    if: >-
      github.ref == 'refs/heads/main'
      && github.repository == 'nakafaai/aksara'
      && (inputs.operation == 'accept'
        || inputs.operation == 'release'
        || inputs.operation == 'rollback')
    permissions:
      contents: read
    uses: ./.github/workflows/package-proof.yml
    with:
      proof_mode: current

  publish:
    needs: package
    if: >-
      always()
      && github.ref == 'refs/heads/main'
      && github.repository == 'nakafaai/aksara'
      && (
        ((inputs.operation == 'accept'
          || inputs.operation == 'release'
          || inputs.operation == 'rollback')
          && needs.package.result == 'success')
        || ((inputs.operation == 'abort'
          || inputs.operation == 'cleanup'
          || inputs.operation == 'recover')
          && needs.package.result == 'skipped')
      )
    environment: content-production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Validate operation
        env:
          OPERATION: ${{ inputs.operation }}
          RECOVERY_ID: ${{ inputs.recovery_id }}
          RELEASE_ID: ${{ inputs.release_id }}
          ROLLBACK_OF: ${{ inputs.rollback_of }}
        run: |
          if [[ "$OPERATION" != "rollback" && -n "$ROLLBACK_OF" ]]; then
            echo "Only rollback may select prior release state." >&2
            exit 1
          fi
          if [[ "$OPERATION" == "rollback" && -z "$ROLLBACK_OF" ]]; then
            echo "A rollback must name the exact active release." >&2
            exit 1
          fi
          if [[ "$OPERATION" == "release" || "$OPERATION" == "rollback" || "$OPERATION" == "accept" || "$OPERATION" == "recover" ]]; then
            if [[ -z "$RECOVERY_ID" ]]; then
              echo "The operation must name its exact retained inverse." >&2
              exit 1
            fi
            if [[ "$RECOVERY_ID" == "$RELEASE_ID" ]]; then
              echo "Active and recovery release identities must differ." >&2
              exit 1
            fi
          elif [[ -n "$RECOVERY_ID" ]]; then
            echo "Abort and cleanup do not accept a recovery identity." >&2
            exit 1
          fi
          if [[ "$OPERATION" == "rollback" && ( "$ROLLBACK_OF" == "$RELEASE_ID" || "$ROLLBACK_OF" == "$RECOVERY_ID" ) ]]; then
            echo "Rollback, candidate, and recovery identities must differ." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify exact main revision
        run: |
          if [[ -n "$(git status --porcelain=v1 --untracked-files=normal)" ]]; then
            echo "The reviewed production checkout is dirty." >&2
            exit 1
          fi
          git rev-parse --verify HEAD

      - name: Verify repository controls
        run: |
          pnpm lint
          pnpm deprecations
          pnpm names
          pnpm jsdocs
          pnpm lines
          pnpm workflows
          pnpm boundaries

      - name: Verify full publication revision
        if: inputs.operation == 'accept' || inputs.operation == 'release' || inputs.operation == 'rollback'
        run: |
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm verify:package

      - name: Verify terminal operation revision
        if: inputs.operation == 'abort' || inputs.operation == 'cleanup' || inputs.operation == 'recover'
        run: >-
          pnpm exec turbo run typecheck test build
          --filter=@nakafa/aksara-contracts
          --filter=@nakafa/aksara-publisher
          --filter=@nakafa/aksara-cli

      - name: Publish release
        if: inputs.operation == 'release'
        env:
          AKSARA_PUBLICATION_ENDPOINT: ${{ vars.AKSARA_PUBLICATION_ENDPOINT }}
          AKSARA_PUBLICATION_TOKEN: ${{ secrets.AKSARA_PUBLICATION_TOKEN }}
          AKSARA_RENDERER_ENDPOINT: ${{ vars.AKSARA_RENDERER_ENDPOINT }}
          AKSARA_RENDERER_TOKEN: ${{ secrets.AKSARA_RENDERER_TOKEN }}
          AKSARA_SIGNING_KEY_ID: ${{ vars.AKSARA_SIGNING_KEY_ID }}
          AKSARA_SIGNING_PRIVATE_KEY: ${{ secrets.AKSARA_SIGNING_PRIVATE_KEY }}
          RECOVERY_ID: ${{ inputs.recovery_id }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: >-
          pnpm release -- --release-id "$RELEASE_ID"
          --recovery-id "$RECOVERY_ID"

      - name: Publish rollback
        if: inputs.operation == 'rollback'
        env:
          AKSARA_PUBLICATION_ENDPOINT: ${{ vars.AKSARA_PUBLICATION_ENDPOINT }}
          AKSARA_PUBLICATION_TOKEN: ${{ secrets.AKSARA_PUBLICATION_TOKEN }}
          AKSARA_RENDERER_ENDPOINT: ${{ vars.AKSARA_RENDERER_ENDPOINT }}
          AKSARA_RENDERER_TOKEN: ${{ secrets.AKSARA_RENDERER_TOKEN }}
          AKSARA_SIGNING_KEY_ID: ${{ vars.AKSARA_SIGNING_KEY_ID }}
          AKSARA_SIGNING_PRIVATE_KEY: ${{ secrets.AKSARA_SIGNING_PRIVATE_KEY }}
          RECOVERY_ID: ${{ inputs.recovery_id }}
          RELEASE_ID: ${{ inputs.release_id }}
          ROLLBACK_OF: ${{ inputs.rollback_of }}
        run: >-
          pnpm rollback -- --release-id "$RELEASE_ID"
          --recovery-id "$RECOVERY_ID"
          --rollback-of "$ROLLBACK_OF"

      - name: Accept active release
        if: inputs.operation == 'accept'
        env:
          AKSARA_PUBLICATION_ENDPOINT: ${{ vars.AKSARA_PUBLICATION_ENDPOINT }}
          AKSARA_PUBLICATION_TOKEN: ${{ secrets.AKSARA_PUBLICATION_TOKEN }}
          RECOVERY_ID: ${{ inputs.recovery_id }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: >-
          pnpm accept -- --release-id "$RELEASE_ID"
          --recovery-id "$RECOVERY_ID"

      - name: Recover active release
        if: inputs.operation == 'recover'
        env:
          AKSARA_PUBLICATION_ENDPOINT: ${{ vars.AKSARA_PUBLICATION_ENDPOINT }}
          AKSARA_PUBLICATION_TOKEN: ${{ secrets.AKSARA_PUBLICATION_TOKEN }}
          AKSARA_RENDERER_ENDPOINT: ${{ vars.AKSARA_RENDERER_ENDPOINT }}
          AKSARA_RENDERER_TOKEN: ${{ secrets.AKSARA_RENDERER_TOKEN }}
          RECOVERY_ID: ${{ inputs.recovery_id }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: >-
          pnpm recover -- --release-id "$RELEASE_ID"
          --recovery-id "$RECOVERY_ID"

      - name: Clean unreachable release
        if: inputs.operation == 'cleanup'
        env:
          AKSARA_PUBLICATION_ENDPOINT: ${{ vars.AKSARA_PUBLICATION_ENDPOINT }}
          AKSARA_PUBLICATION_TOKEN: ${{ secrets.AKSARA_PUBLICATION_TOKEN }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: pnpm cleanup -- --release-id "$RELEASE_ID"

      - name: Abort pending release
        if: inputs.operation == 'abort'
        env:
          AKSARA_PUBLICATION_ENDPOINT: ${{ vars.AKSARA_PUBLICATION_ENDPOINT }}
          AKSARA_PUBLICATION_TOKEN: ${{ secrets.AKSARA_PUBLICATION_TOKEN }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: pnpm abort -- --release-id "$RELEASE_ID"
