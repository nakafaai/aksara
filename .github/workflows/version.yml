name: Version contracts

on:
  push:
    branches: [main]

permissions: {}

env:
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.15.1

concurrency:
  group: version-contracts
  cancel-in-progress: false

jobs:
  version:
    if: github.repository == 'nakafaai/aksara'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package bootstrap
        id: bootstrap
        run: |
          bootstrapped=$(jq -er 'if (.contracts | type) == "boolean" then (.contracts | tostring) else empty end' .changeset/bootstrap.json)
          if [[ "$bootstrapped" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Initial package proof is incomplete; version automation remains inactive."
          fi

      - name: Create version pull request
        if: steps.bootstrap.outputs.ready == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          commit: "chore: version contracts"
          commitMode: github-api
          createGithubReleases: false
          title: "chore: version contracts"
          version: pnpm version-packages
